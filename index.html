  function wireDynamicFields(){
    const playerSel = document.getElementById('f_player');
    if(playerSel){
      if (localPlayerId !== 'banker' && !playerSel.dataset.only && playerById(localPlayerId)) {
        playerSel.value = localPlayerId;
      }
      
      const only = playerSel.dataset.only;
      if(only){
        [...playerSel.options].forEach(opt=>{
          const p = playerById(opt.value);
          if(!p) return;
          let hide = false;
          if(only==='jailed') hide = !p.jailed;
          if(only==='noPassport') hide = p.passport;
          if(only==='hasCC') hide = !(p.creditCard && p.creditCard.used);
          if(only==='noCC') hide = (p.creditCard && p.creditCard.used);
          if(only==='canBuildHouse') hide = !ownedBy(p.id).some(pr=>pr.category==='Country' && !pr.mortgaged && !pr.hotel && pr.houses<MAX_HOUSES && isMonopoly(pr));
          if(only==='hasHouse') hide = !ownedBy(p.id).some(pr=>pr.houses>0 && !pr.hotel);
          if(only==='readyForHotel') hide = !ownedBy(p.id).some(pr=>pr.houses>=MAX_HOUSES && !pr.hotel);
          if(only==='hasHotel') hide = !ownedBy(p.id).some(pr=>pr.hotel);
          if(hide) opt.remove();
        });
      }

      if(playerSel.dataset.propsSource){
        const populateProps = () => {
          const propSel = document.getElementById('f_property');
          if(!propSel) return;
          const filterMode = playerSel.dataset.only;
          let props = ownedBy(playerSel.value);
          if(filterMode==='unmortgaged') props = props.filter(pr=>!pr.mortgaged);
          if(filterMode==='mortgaged') props = props.filter(pr=>pr.mortgaged);
          if(filterMode==='canBuildHouse') props = props.filter(pr=>pr.category==='Country' && !pr.mortgaged && !pr.hotel && pr.houses<MAX_HOUSES && isMonopoly(pr));
          if(filterMode==='hasHouse') props = props.filter(pr=>pr.houses>0 && !pr.hotel);
          if(filterMode==='readyForHotel') props = props.filter(pr=>pr.houses>=MAX_HOUSES && !pr.hotel);
          if(filterMode==='hasHotel') props = props.filter(pr=>pr.hotel);
          propSel.innerHTML = propertyOptions(props);
          propSel.dispatchEvent(new Event('change'));
        };
        playerSel.addEventListener('change', populateProps);
        populateProps();
      }
    }

    const player2Sel = document.getElementById('f_player2');
    if (player2Sel && player2Sel.dataset.propsSource) {
      const populateProps2 = () => {
        const targetId = player2Sel.dataset.targetProp;
        const propSel = document.getElementById(targetId);
        if(!propSel) return;
        let props = ownedBy(player2Sel.value).filter(pr => !pr.mortgaged);
        propSel.innerHTML = '<option value="">— select property —</option>' + propertyOptions(props);
        propSel.dispatchEvent(new Event('change'));
      };
      player2Sel.addEventListener('change', populateProps2);
      populateProps2();
    }

    document.querySelectorAll('[data-autofill]').forEach(sel => {
      const amountField = document.getElementById('f_amount');
      const breakdownField = document.getElementById('rentBreakdown');
      const warningField = document.getElementById('rentWarning');
      const autofillMode = sel.dataset.autofill;
      
      const updateAmount = () => {
        const pr = (state.board || []).find(x => x.id === sel.value);
        if (breakdownField) breakdownField.innerHTML = '';
        if (warningField) warningField.innerHTML = '';
        
        if (pr && amountField) {
          if (autofillMode === 'price') amountField.value = pr.price;
          if (autofillMode === 'mortgage') amountField.value = pr.mortgage;
          if (autofillMode === 'rent') {
            const calc = calcRent(pr);
            amountField.value = calc.final;
            if(breakdownField) breakdownField.innerHTML = `<div class="rent-breakdown">${calc.breakdown.join('<br>')}</div>`;
            const owner = playerById(pr.ownerId);
            const block = rentBlockReason(owner, pr);
            if(block && warningField) warningField.innerHTML = `<div class="warn-box">⚠ ${escapeHtml(block)}</div>`;
          }
        } else if (!pr && amountField) {
          amountField.value = '';
        }
      };
      sel.addEventListener('change', updateAmount);
      if (sel.value) updateAmount();
    });

    if(document.getElementById('f_dutyType')){
      const dutySel = document.getElementById('f_dutyType');
      const updateHint = ()=>{
        const p = playerById(playerSel.value);
        if(!p) return;
        const conf = DUTY_RATES[dutySel.value];
        const owned = ownedBy(p.id).filter(pr=>!pr.mortgaged).length;
        const amt = Math.min(owned*conf.rate, conf.cap);
        document.getElementById('dutyHint').textContent =
          `${p.name} owns ${owned} propert${owned===1?'y':'ies'} → owes ${fmt(amt)} (capped at ${fmt(conf.cap)}).`;
      };
      playerSel.addEventListener('change', updateHint);
      dutySel.addEventListener('change', updateHint);
      updateHint();
    }

    if(document.getElementById('ccHint')){
      const updateCC = ()=>{
        const p = playerById(playerSel.value);
        if(p && p.creditCard && p.creditCard.used) {
          document.getElementById('ccHint').textContent =
            `Pays $2,000 toward ${p.name}'s outstanding balance (${p.creditCard.remainingInstallments} of 6 installments remain).`;
        }
      };
      playerSel.addEventListener('change', updateCC);
      updateCC();
    }

    if(document.getElementById('houseHint')){
      const propSel = document.getElementById('f_property');
      const hintBox = document.getElementById('houseHint');
      const updateHouse = ()=>{
        const pr = (state.board||[]).find(x=>x.id===propSel.value);
        if(!pr){ hintBox.textContent = 'No eligible property available.'; return; }
        const cost = getHouseCost(pr);
        const t = state._txType;
        if(t==='buildHouse') hintBox.textContent = `Cost: ${fmt(cost)}. ${pr.houses} of ${MAX_HOUSES} houses built.`;
        if(t==='sellHouse') hintBox.textContent = `Refund: ${fmt(Math.round(cost/2))} (half of build cost). ${pr.houses} house(s) currently built.`;
        if(t==='buildHotel') hintBox.textContent = `Cost: ${fmt(cost)}. Replaces the 4 houses on this property.`;
        if(t==='sellHotel') hintBox.textContent = `Refund: ${fmt(Math.round(cost/2))}. Hotel converts back to 4 houses.`;
      };
      const populate = ()=>{
        const only = document.getElementById('f_player').dataset.only;
        let props = ownedBy(document.getElementById('f_player').value);
        if(only==='canBuildHouse') props = props.filter(pr=>pr.category==='Country' && !pr.mortgaged && !pr.hotel && pr.houses<MAX_HOUSES && isMonopoly(pr));
        if(only==='hasHouse') props = props.filter(pr=>pr.houses>0 && !pr.hotel);
        if(only==='readyForHotel') props = props.filter(pr=>pr.houses>=MAX_HOUSES && !pr.hotel);
        if(only==='hasHotel') props = props.filter(pr=>pr.hotel);
        propSel.innerHTML = propertyOptions(props);
        updateHouse();
      };
      document.getElementById('f_player').addEventListener('change', populate);
      propSel.addEventListener('change', updateHouse);
      populate();
    }

    if(document.getElementById('f_deck')){
      const deckSel = document.getElementById('f_deck');
      const cardSel = document.getElementById('f_card');
      const preview = document.getElementById('cardPreview');
      const repairBox = document.getElementById('repairFields');
      const populateCards = ()=>{
        const deck = CARD_DECKS[deckSel.value];
        cardSel.innerHTML = deck.cards.map((c,i)=>`<option value="${i}">#${c.num} — ${escapeHtml(c.text)}</option>`).join('');
        updatePreview();
      };
      const updatePreview = ()=>{
        const deck = CARD_DECKS[deckSel.value];
        const card = deck.cards[cardSel.value];
        let amtText = '';
        if(card.type==='pay') amtText = `Pay ${fmt(card.amount)} to the Bank.`;
        if(card.type==='receive') amtText = `Receive ${fmt(card.amount)} from the Bank.`;
        if(card.type==='collectEach') amtText = `Collect ${fmt(card.amount)} from each other active player.`;
        if(card.type==='jail') amtText = `Go directly to Jail.`;
        if(card.type==='passportLose') amtText = `Passport is confiscated — no rent collection until regained.`;
        if(card.type==='repair') amtText = `Pay $${card.perHouse} per house and $${card.perHotel} per hotel you own.`;
        preview.innerHTML = `<span class="cnum">#${card.num}</span>${escapeHtml(card.text)}<br>${amtText}`;
        repairBox.innerHTML = card.type==='repair' ? `
          <div class="field-row">
            <div><div class="field-label">Houses owned</div><input class="action-select" id="f_houses" type="number" value="0" min="0"></div>
            <div><div class="field-label">Hotels owned</div><input class="action-select" id="f_hotels" type="number" value="0" min="0"></div>
          </div>
        ` : '';
      };
      deckSel.addEventListener('change', populateCards);
      cardSel.addEventListener('change', updatePreview);
      populateCards();
    }
  }

  // ============================================================
  // MODULE: Transaction Handling
  // ============================================================
  function handleSubmit(){
    if(isProcessing) return; // prevent duplicate/rapid submissions
    const btn = document.getElementById('btnSubmitTx');
    isProcessing = true;
    btn.disabled = true;
    btn.innerText = "Processing...";

    const release = () => {
      isProcessing = false;
      if(btn) { btn.disabled = false; btn.innerText = "Record it"; }
    };

    const t = state._txType || document.getElementById('txType').value;
    const getVal = id => { const el=document.getElementById(id); return el?el.value:null; };
    const player = ()=> playerById(getVal('f_player'));

    stashUndoSnapshot();

    try{
      switch(t){
        case 'buyProperty': {
          const p = player(); const propId = getVal('f_property');
          const prop = (state.board || []).find(pr=>pr.id===propId);
          const amt = Number(getVal('f_amount'))||0;
          if(!prop){ alert('No property available to buy.'); release(); return; }
          prop.ownerId = p.id; prop.mortgaged = false; prop.houses = 0; prop.hotel = false;
          p.cash -= amt;
          addLog(`<b>${escapeHtml(p.name)}</b> bought <b>${escapeHtml(prop.name)}</b> from the Bank for ${fmt(amt)}.`, 'property');
          showToast("Property Bought", `${p.name} added ${prop.name} to their portfolio.`);
          break;
        }
        case 'sellProperty': {
          const p = player(); const propId = getVal('f_property');
          const amt = Number(getVal('f_amount'))||0;
          const prop = (state.board || []).find(pr=>pr.id===propId);
          if(prop){ prop.ownerId = ""; prop.mortgaged = false; prop.houses = 0; prop.hotel = false; }
          p.cash += amt;
          addLog(`<b>${escapeHtml(p.name)}</b> sold <b>${escapeHtml(prop?prop.name:'a property')}</b> to the Bank for ${fmt(amt)}.`, 'property');
          break;
        }
        case 'mortgage': {
          const p = player(); const propId = getVal('f_property');
          const amt = Number(getVal('f_amount'))||0;
          const prop = (state.board || []).find(pr=>pr.id===propId);
          if(prop){
            if(prop.houses>0 || prop.hotel){ alert('Sell all houses/hotel on this property before mortgaging it.'); release(); return; }
            prop.mortgaged = true;
          }
          p.cash += amt;
          addLog(`<b>${escapeHtml(p.name)}</b> mortgaged <b>${escapeHtml(prop?prop.name:'a property')}</b> to the Bank, receiving ${fmt(amt)}.`, 'mortgage');
          break;
        }
        case 'unmortgage': {
          const p = player(); const propId = getVal('f_property');
          const amt = Number(getVal('f_amount'))||0;
          const prop = (state.board || []).find(pr=>pr.id===propId);
          if(prop) prop.mortgaged = false;
          p.cash -= amt;
          addLog(`<b>${escapeHtml(p.name)}</b> paid the Bank ${fmt(amt)} to lift the mortgage on <b>${escapeHtml(prop?prop.name:'a property')}</b>.`, 'mortgage');
          break;
        }
        case 'payRent': {
          const p = player(); const p2 = playerById(getVal('f_player2'));
          const amt = Number(getVal('f_amount'))||0;
          const propId = getVal('f_propName');
          const prop = (state.board || []).find(pr=>pr.id===propId);
          const propNameStr = prop ? prop.name : '';

          const block = prop ? rentBlockReason(p2, prop) : null;
          if(block){
            addLog(`Rent attempt blocked: ${escapeHtml(block)}`, 'rent');
            showToast('Rent Blocked', block);
            break;
          }
          p.cash -= amt; p2.cash += amt;
          p.stats.rentPaid += amt; p2.stats.rentCollected += amt;
          addLog(`<b>${escapeHtml(p.name)}</b> paid <b>${escapeHtml(p2.name)}</b> ${fmt(amt)} rent${propNameStr?` for ${escapeHtml(propNameStr)}`:''}.`, 'rent');
          break;
        }
        case 'buildHouse': {
          const p = player(); const prop = (state.board||[]).find(pr=>pr.id===getVal('f_property'));
          if(!prop){ alert('Select a property.'); release(); return; }
          if(prop.mortgaged || prop.hotel || prop.houses>=MAX_HOUSES || !isMonopoly(prop)){ alert('This property is not eligible for a new house.'); release(); return; }
          const cost = getHouseCost(prop);
          prop.houses += 1; p.cash -= cost;
          addLog(`<b>${escapeHtml(p.name)}</b> built a house on <b>${escapeHtml(prop.name)}</b> for ${fmt(cost)} (now ${prop.houses}).`, 'building');
          break;
        }
        case 'sellHouse': {
          const p = player(); const prop = (state.board||[]).find(pr=>pr.id===getVal('f_property'));
          if(!prop || prop.houses<=0){ alert('No house to sell on this property.'); release(); return; }
          const refund = Math.round(getHouseCost(prop)/2);
          prop.houses -= 1; p.cash += refund;
          addLog(`<b>${escapeHtml(p.name)}</b> sold a house on <b>${escapeHtml(prop.name)}</b> for ${fmt(refund)} (now ${prop.houses}).`, 'building');
          break;
        }
        case 'buildHotel': {
          const p = player(); const prop = (state.board||[]).find(pr=>pr.id===getVal('f_property'));
          if(!prop || prop.houses<MAX_HOUSES || prop.hotel){ alert('This property needs 4 houses before a hotel can be built.'); release(); return; }
          const cost = getHouseCost(prop);
          prop.hotel = true; prop.houses = 0; p.cash -= cost;
          addLog(`<b>${escapeHtml(p.name)}</b> built a HOTEL on <b>${escapeHtml(prop.name)}</b> for ${fmt(cost)}.`, 'building');
          break;
        }
        case 'sellHotel': {
          const p = player(); const prop = (state.board||[]).find(pr=>pr.id===getVal('f_property'));
          if(!prop || !prop.hotel){ alert('No hotel to sell on this property.'); release(); return; }
          const refund = Math.round(getHouseCost(prop)/2);
          prop.hotel = false; prop.houses = MAX_HOUSES; p.cash += refund;
          addLog(`<b>${escapeHtml(p.name)}</b> sold the hotel on <b>${escapeHtml(prop.name)}</b> for ${fmt(refund)} (reverts to 4 houses).`, 'building');
          break;
        }
        case 'passStart': {
          const p = player();
          p.cash += PASS_START_BONUS;
          p.stats.incomeEarned += PASS_START_BONUS;
          addLog(`<b>${escapeHtml(p.name)}</b> passed Start and collected ${fmt(PASS_START_BONUS)}.`, 'bank');
          showToast("Payday", `${p.name} collected their $1,500 bonus.`);
          break;
        }
        case 'bankPay': {
          const p = player(); const amt = Number(getVal('f_amount'))||0;
          const reason = getVal('f_reason')||'payment';
          p.cash -= amt; p.stats.moneyPaid += amt;
          addLog(`<b>${escapeHtml(p.name)}</b> paid the Bank ${fmt(amt)} (${escapeHtml(reason)}).`, 'bank');
          break;
        }
        case 'bankReceive': {
          const p = player(); const amt = Number(getVal('f_amount'))||0;
          const reason = getVal('f_reason')||'receipt';
          p.cash += amt; p.stats.incomeEarned += amt;
          addLog(`<b>${escapeHtml(p.name)}</b> received ${fmt(amt)} from the Bank (${escapeHtml(reason)}).`, 'bank');
          break;
        }
        case 'duty': {
          const p = player(); const conf = DUTY_RATES[getVal('f_dutyType')];
          const owned = ownedBy(p.id).filter(pr=>!pr.mortgaged).length;
          const amt = Math.min(owned*conf.rate, conf.cap);
          p.cash -= amt; p.stats.taxesPaid += amt;
          addLog(`<b>${escapeHtml(p.name)}</b> paid ${fmt(amt)} in ${conf.label} (${owned} propert${owned===1?'y':'ies'} owned).`, 'tax');
          break;
        }
        case 'creditCardUse': {
          const p = player(); const amt = Math.min(Number(getVal('f_amount'))||0, 10000);
          const reason = getVal('f_reason')||'credit card use';
          if(p.creditCard.used){ alert('This player has already used their credit card this game.'); release(); return; }
          p.cash += amt;
          p.creditCard.used = true;
          p.creditCard.remainingInstallments = 6;
          p.creditCard.paidInstallments = 0;
          p.creditCard.missedInstallments = 0;
          addLog(`<b>${escapeHtml(p.name)}</b> drew ${fmt(amt)} on the Credit Card (${escapeHtml(reason)}) — owes $12,000 back in 6×$2,000.`, 'credit');
          break;
        }
        case 'creditCardInstallment': {
          const p = player();
          p.cash -= 2000; p.stats.moneyPaid += 2000;
          p.creditCard.remainingInstallments = Math.max(0, p.creditCard.remainingInstallments-1);
          p.creditCard.paidInstallments += 1;
          if(p.creditCard.remainingInstallments===0) p.creditCard.used=false;
          addLog(`<b>${escapeHtml(p.name)}</b> paid a $2,000 credit card installment (${p.creditCard.remainingInstallments} remaining).`, 'credit');
          break;
        }
        case 'creditCardMissed': {
          const p = player();
          p.creditCard.missedInstallments += 1;
          p.jailed = true; p.jailReason = 'Missed $2,000 credit card payment'; p.jailEntryRound = state.round; p.jailTurns = 0;
          addLog(`<b>${escapeHtml(p.name)}</b> missed a credit card installment and was sent to Jail.`, 'credit');
          break;
        }
        case 'cardDraw': {
          const p = player();
          const deck = CARD_DECKS[getVal('f_deck')];
          const card = deck.cards[Number(getVal('f_card'))];
          const deckName = getVal('f_deck').startsWith('chance') ? 'CHANCE' : 'UNO';
          if(card.type==='pay'){ p.cash -= card.amount; p.stats.moneyPaid += card.amount; addLog(`<b>${escapeHtml(p.name)}</b> drew ${deckName} #${card.num}: "${escapeHtml(card.text)}" — paid ${fmt(card.amount)}.`, 'card'); }
          else if(card.type==='receive'){ p.cash += card.amount; p.stats.incomeEarned += card.amount; addLog(`<b>${escapeHtml(p.name)}</b> drew ${deckName} #${card.num}: "${escapeHtml(card.text)}" — received ${fmt(card.amount)}.`, 'card'); }
          else if(card.type==='collectEach'){
            const others = activePlayers().filter(x=>x.id!==p.id);
            others.forEach(o=>{ o.cash -= card.amount; o.stats.moneyPaid += card.amount; p.cash += card.amount; });
            p.stats.incomeEarned += card.amount*others.length;
            addLog(`<b>${escapeHtml(p.name)}</b> drew ${deckName} #${card.num}: "${escapeHtml(card.text)}" — collected ${fmt(card.amount)} from each of ${others.length} player(s).`, 'card');
          }
          else if(card.type==='jail'){ p.jailed = true; p.jailReason='Sent by Chance/UNO'; p.jailEntryRound=state.round; p.jailTurns=0; addLog(`<b>${escapeHtml(p.name)}</b> drew ${deckName} #${card.num}: "${escapeHtml(card.text)}" — sent to Jail.`, 'card'); }
          else if(card.type==='passportLose'){ p.passport = false; p.passportLostRound = state.round; addLog(`<b>${escapeHtml(p.name)}</b> drew ${deckName} #${card.num}: "${escapeHtml(card.text)}" — Passport confiscated.`, 'card'); }
          else if(card.type==='repair'){
            const houses = Number(getVal('f_houses'))||0;
            const hotels = Number(getVal('f_hotels'))||0;
            const amt = houses*card.perHouse + hotels*card.perHotel;
            p.cash -= amt; p.stats.moneyPaid += amt;
            addLog(`<b>${escapeHtml(p.name)}</b> drew ${deckName} #${card.num}: "${escapeHtml(card.text)}" — paid ${fmt(amt)} (${houses} house(s), ${hotels} hotel(s)).`, 'card');
          }
          break;
        }
        case 'partyHouse': {
          const p = player(); const others = activePlayers().filter(x=>x.id!==p.id);
          others.forEach(o=>{ o.cash -= 200; o.stats.moneyPaid += 200; p.cash += 200; });
          p.stats.incomeEarned += 200*others.length;
          addLog(`<b>${escapeHtml(p.name)}</b> landed on Party House and collected $200 from each of ${others.length} player(s).`, 'event');
          break;
        }
        case 'resort': {
          const p = player(); const others = activePlayers().filter(x=>x.id!==p.id);
          others.forEach(o=>{ o.cash += 200; o.stats.incomeEarned += 200; p.cash -= 200; });
          p.stats.moneyPaid += 200*others.length;
          addLog(`<b>${escapeHtml(p.name)}</b> landed on Resort and paid $200 to each of ${others.length} player(s).`, 'event');
          break;
        }
        case 'jailEnter': {
          const p = player(); const reason = getVal('f_reason');
          p.jailed = true; p.jailReason = reason; p.jailEntryRound = state.round; p.jailTurns = 0;
          addLog(`<b>${escapeHtml(p.name)}</b> went to Jail (${escapeHtml(reason)}).`, 'jail');
          break;
        }
        case 'jailExit': {
          const p = player(); const method = getVal('f_method');
          if(method==='pay500'){ p.cash -= 500; p.stats.moneyPaid += 500; }
          if(method==='pay3000cc'){ 
            p.creditCard.used=true; 
            p.creditCard.remainingInstallments=Math.max(p.creditCard.remainingInstallments,6); 
          }
          p.jailed = false; p.jailReason=''; p.jailTurns = 0;
          const methodText = { pay500:'paid the Bank $500', roll12:'rolled a 12 and threw three times', pay3000cc:'paid $3,000 via Credit Card' }[method];
          addLog(`<b>${escapeHtml(p.name)}</b> got out of Jail — ${methodText}.`, 'jail');
          break;
        }
        case 'passportRegain': {
          const p = player(); const method = getVal('f_method');
          if(method==='pay5000'){ p.cash -= 5000; p.stats.moneyPaid += 5000; }
          p.passport = true; p.passportLostRound = 0;
          addLog(`<b>${escapeHtml(p.name)}</b> regained their Passport (${method==='pay5000'?'paid $5,000':'completed 6 rounds'}).`, 'passport');
          break;
        }
        case 'bankrupt': {
          const p = player();
          (state.board || []).forEach(pr=>{ if(pr.ownerId===p.id){ pr.ownerId=""; pr.mortgaged=false; pr.houses=0; pr.hotel=false; } });
          p.bankrupt = true; p.cash = 0;
          addLog(`<b>${escapeHtml(p.name)}</b> is BANKRUPT and retires from the game. Properties, houses and hotels return to the Bank.`, 'bankrupt');
          break;
        }
      }
    }catch(err){
      console.error(err);
      alert('Could not record that transaction — check the fields and try again.');
      release();
      return;
    }
    saveState();
    checkForWinner();
    release();
  }
</script>
