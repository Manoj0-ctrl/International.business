<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE LEDGER — International Business Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Chart.js CDN for Live Analytics -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  :root{
    --ink:#12271F;
    --ink-2:#0C1D16;
    --paper:#F4EFDD;
    --paper-2:#EAE2C4;
    --navy:#1D2B35;
    --brass:#B08D3E;
    --brass-light:#D8BB74;
    --stamp-red:#9B3A34;
    --stamp-blue:#2E4A6B;
    --good:#3C6E47;
    --line: rgba(29,43,53,0.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(216,187,116,0.06), transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(216,187,116,0.05), transparent 45%);
    color:var(--navy);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #app{max-width:520px;margin:0 auto;padding:18px 14px 90px;}

  /* TOAST NOTIFICATION STYLES */
  #toast-container {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999;
    display: flex; flex-direction: column; gap: 10px; pointer-events: none; width: 92%; max-width: 450px;
  }
  .toast {
    background: var(--ink-2); color: var(--paper); padding: 14px 18px; border-radius: 4px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4); font-size: 13px; font-family: 'Inter', sans-serif; line-height: 1.5;
    border-left: 4px solid var(--brass); opacity: 0; 
    animation: slideIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards, fadeOut 0.4s ease forwards 5.5s;
  }
  .toast b { color: var(--brass-light); font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 4px; }
  
  @keyframes slideIn { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
  @keyframes pulseGlow { 0%,100%{box-shadow:0 4px 14px rgba(0,0,0,0.25);} 50%{box-shadow:0 4px 22px rgba(216,187,116,0.55);} }
  @keyframes fadeInUp { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

  .masthead{
    text-align:center;
    padding:22px 10px 18px;
    color:var(--paper);
    border-bottom:1px solid rgba(216,187,116,0.25);
    margin-bottom:18px;
    position:relative;
  }
  .masthead .eyebrow{
    font-family:'JetBrains Mono',monospace;
    letter-spacing:.28em;
    font-size:10.5px;
    color:var(--brass-light);
    text-transform:uppercase;
  }
  .masthead h1{
    font-family:'Playfair Display',serif;
    font-weight:800;
    font-size:34px;
    margin:6px 0 4px;
    letter-spacing:.01em;
  }
  .masthead .sub{
    font-size:12px;
    color:rgba(244,239,221,0.6);
    font-style:italic;
  }
  .round-strip{
    display:flex;align-items:center;justify-content:center;gap:10px;
    margin-top:14px;flex-wrap:wrap;
  }
  .round-pill{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--ink);
    background:var(--brass-light);
    padding:5px 12px;
    border-radius:2px;
    letter-spacing:.06em;
  }
  .btn-ghost{
    background:transparent;border:1px solid rgba(244,239,221,0.35);
    color:rgba(244,239,221,0.85);
    font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.06em;
    padding:5px 10px;border-radius:2px;cursor:pointer;
    min-height:30px;
  }
  .btn-ghost:hover{border-color:var(--brass-light);color:var(--brass-light);}
  
  .nav-tabs {
    display: flex; gap: 10px; margin-bottom: 16px;
  }
  .nav-tab {
    flex: 1; text-align: center; padding: 10px;
    background: rgba(244,239,221,0.1); color: var(--paper);
    border: 1px solid rgba(244,239,221,0.2);
    border-radius: 3px; cursor: pointer;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.1em;
    text-transform: uppercase; transition: all 0.2s;
    min-height:42px; display:flex; align-items:center; justify-content:center;
  }
  .nav-tab.active {
    background: var(--brass-light); color: var(--ink); border-color: var(--brass-light); font-weight: bold;
  }

  /* Bottom nav for mobile */
  .bottom-nav{
    position:fixed; left:0; right:0; bottom:0; z-index:9000;
    background:var(--ink-2); border-top:1px solid rgba(216,187,116,0.25);
    display:flex; padding:6px 8px calc(6px + env(safe-area-inset-bottom, 0px));
    box-shadow:0 -8px 24px rgba(0,0,0,0.4);
  }
  .bottom-nav .bn-item{
    flex:1; text-align:center; padding:8px 4px; border-radius:4px; cursor:pointer;
    font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.05em; text-transform:uppercase;
    color:rgba(244,239,221,0.6); min-height:48px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
  }
  .bottom-nav .bn-item .bn-icon{font-size:17px;}
  .bottom-nav .bn-item.active{color:var(--brass-light); background:rgba(216,187,116,0.12);}

  .offline-banner{
    background:var(--stamp-red); color:#fff; text-align:center; font-family:'JetBrains Mono',monospace;
    font-size:11px; padding:7px; letter-spacing:.05em; position:sticky; top:0; z-index:9998;
    border-radius:2px; margin-bottom:12px;
  }

  .paper-card{
    background:var(--paper);
    border-radius:3px;
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
    padding:20px;
    position:relative;
    background-image: repeating-linear-gradient(to bottom, transparent, transparent 27px, var(--line) 28px);
    margin-bottom: 16px;
  }
  .paper-card::before{
    content:'';
    position:absolute; left:14px; top:0; bottom:0; width:1px;
    background:rgba(155,58,52,0.18);
  }
  .card-title{
    font-family:'Playfair Display',serif;
    font-weight:700;
    font-size:19px;
    margin:0 0 4px 20px;
    color:var(--ink);
  }
  .card-hint{
    font-size:12px;color:rgba(29,43,53,0.55);margin:0 0 16px 20px;
  }
  .player-input-row{
    display:flex;gap:8px;margin:0 0 10px 20px;
  }
  .player-input-row input{
    flex:1;
    font-family:'Inter',sans-serif;
    font-size:14.5px;
    padding:9px 10px;
    border:1px solid rgba(29,43,53,0.25);
    border-radius:2px;
    background:rgba(255,255,255,0.5);
    min-height:40px;
  }
  .icon-btn{
    width:40px;flex-shrink:0;
    border:1px solid rgba(29,43,53,0.25);
    background:rgba(255,255,255,0.4);
    border-radius:2px;font-size:16px;cursor:pointer;color:var(--navy);
    min-height:40px;
  }
  .btn-primary{
    width:100%;
    background:var(--ink);
    color:var(--paper);
    font-family:'JetBrains Mono',monospace;
    letter-spacing:.08em;
    font-size:12.5px;
    text-transform:uppercase;
    padding:14px;
    border:none;border-radius:2px;
    cursor:pointer;
    margin-top:6px;
    min-height:48px;
    transition:transform .08s ease;
  }
  .btn-primary:active{transform:scale(0.98);}
  .btn-primary:disabled{opacity:0.55; cursor:not-allowed;}
  .btn-primary:hover{background:var(--ink-2);}
  .btn-secondary{
    width:100%;
    background:transparent;
    border:1.5px solid var(--ink);
    color:var(--ink);
    font-family:'JetBrains Mono',monospace;
    letter-spacing:.06em;
    font-size:11.5px;
    text-transform:uppercase;
    padding:11px;
    border-radius:2px;
    cursor:pointer;
    min-height:44px;
  }
  .btn-small{
    font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.04em;
    padding:7px 10px; border-radius:2px; border:1px solid rgba(29,43,53,0.3);
    background:rgba(255,255,255,0.5); cursor:pointer; min-height:36px;
  }
  .btn-small.danger{border-color:var(--stamp-red); color:var(--stamp-red);}
  .btn-small.good{border-color:var(--good); color:var(--good);}

  .section-label{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--brass-light);
    margin:24px 4px 10px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .player-card{
    background:var(--paper);
    border-radius:3px;
    padding:14px 16px;
    margin-bottom:10px;
    box-shadow:0 6px 18px rgba(0,0,0,0.25);
    position:relative;
    overflow:hidden;
    transition: transform 0.1s ease;
    animation: fadeInUp .25s ease;
  }
  .player-card.bankrupt{opacity:0.55;}
  .player-card.your-turn{border:2px solid var(--brass); animation: pulseGlow 2.2s ease-in-out infinite;}
  .player-card.room-card:hover { transform: translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,0.4); }
  
  .rank-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
  .rank-name{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
  .rank-num{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;color:var(--brass);
    font-weight:700;
  }
  .p-name{
    font-family:'Playfair Display',serif;
    font-weight:700;font-size:18px;color:var(--ink);
  }
  .liquid-cash{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;font-size:22px;color:var(--good);
  }
  .sub-figures{
    display:flex;gap:14px;margin-top:6px;flex-wrap:wrap;
    font-family:'JetBrains Mono',monospace;font-size:11.5px;color:rgba(29,43,53,0.65);
  }
  .stat-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px;
  }
  .stat-box{
    background:rgba(255,255,255,0.45); border:1px dashed rgba(29,43,53,0.2); border-radius:3px;
    padding:8px 10px;
  }
  .stat-box .lbl{font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.06em; text-transform:uppercase; color:rgba(29,43,53,0.5);}
  .stat-box .val{font-family:'JetBrains Mono',monospace; font-size:14px; color:var(--ink); font-weight:700; margin-top:2px;}
  .stamps{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .stamp{
    font-family:'JetBrains Mono',monospace;
    font-size:9.5px;letter-spacing:.08em;
    border:1.5px dashed var(--stamp-red);
    color:var(--stamp-red);
    padding:2px 7px;border-radius:20px;
    transform:rotate(-4deg);
    display:inline-block;
    text-transform:uppercase;
  }
  .stamp.blue{border-color:var(--stamp-blue);color:var(--stamp-blue);transform:rotate(3deg);}
  .stamp.gold{border-color:var(--brass);color:var(--brass);transform:rotate(-2deg);}
  .props-toggle{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--brass);
    margin-top:10px;cursor:pointer;letter-spacing:.05em;
    display:inline-block;
  }
  .props-list{margin-top:8px;border-top:1px dashed rgba(29,43,53,0.2);padding-top:8px;}
  .prop-row{
    display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;
    font-size:12.5px;padding:5px 0;color:var(--navy);
    border-bottom:1px dotted rgba(29,43,53,0.1);
  }
  .prop-row:last-child{border-bottom:none;}
  .prop-row .cat{font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(29,43,53,0.45);margin-right:6px;text-transform:uppercase;}
  .prop-row .mort{color:var(--stamp-red);font-family:'JetBrains Mono',monospace;font-size:10px;margin-left:6px;}
  .prop-row .bldg{color:var(--good);font-family:'JetBrains Mono',monospace;font-size:10px;margin-left:6px;}
  .badge-monopoly{
    display:inline-block; font-family:'JetBrains Mono',monospace; font-size:8.5px; letter-spacing:.06em;
    background:var(--good); color:#fff; padding:2px 6px; border-radius:20px; margin-left:6px; text-transform:uppercase;
  }
  .badge-jail{ background:var(--stamp-red); color:#fff; }
  .badge-nopass{ background:var(--stamp-blue); color:#fff; }

  .action-select{
    width:100%;
    font-family:'Inter',sans-serif;
    font-size:14px;
    padding:11px;
    border:1px solid rgba(29,43,53,0.25);
    border-radius:2px;
    background:rgba(255,255,255,0.6);
    margin-bottom:10px;
    color:var(--navy);
    min-height:42px;
  }
  .field-label{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;letter-spacing:.08em;text-transform:uppercase;
    color:rgba(29,43,53,0.55);
    margin:8px 0 4px 2px;
  }
  .field-row{display:flex;gap:8px;}
  .field-row > *{flex:1;}
  .hint-box{
    font-size:11.5px;color:rgba(29,43,53,0.6);
    background:rgba(176,141,62,0.12);
    border-left:2px solid var(--brass);
    padding:8px 9px;margin:8px 0;border-radius:2px;
  }
  .rent-breakdown{
    font-size:11px; color:rgba(29,43,53,0.75); background:rgba(60,110,71,0.08);
    border-left:2px solid var(--good); padding:7px 9px; margin:8px 0; border-radius:2px; line-height:1.6;
    font-family:'JetBrains Mono',monospace;
  }
  .warn-box{
    font-size:11.5px;color:#fff;
    background:var(--stamp-red);
    padding:8px 9px;margin:8px 0;border-radius:2px;
  }
  .card-preview{
    font-size:12.5px;color:var(--navy);
    background:rgba(255,255,255,0.5);
    border:1px dashed rgba(29,43,53,0.25);
    padding:9px 10px;margin:8px 0;border-radius:2px;
    line-height:1.5;
  }
  .card-preview .cnum{
    font-family:'JetBrains Mono',monospace;color:var(--stamp-red);font-weight:700;margin-right:4px;
  }
  .house-controls{display:flex; gap:6px; align-items:center; margin-top:8px; flex-wrap:wrap;}
  .house-count{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink); padding:0 4px;}

  .turn-banner{
    background:var(--brass-light); color:var(--ink); padding:11px 14px; border-radius:3px;
    font-family:'JetBrains Mono',monospace; font-size:11.5px; letter-spacing:.03em;
    display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:8px;
    box-shadow:0 4px 14px rgba(0,0,0,0.25);
  }
  .turn-banner b{font-family:'Playfair Display',serif;font-size:16px;}
  .locked-note{
    text-align:center; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--stamp-red);
    background:rgba(155,58,52,0.08); border:1px dashed var(--stamp-red); padding:8px; border-radius:3px; margin-bottom:10px;
  }

  .modal-overlay{
    position:fixed; inset:0; background:rgba(12,29,22,0.88); z-index:10000;
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .modal-box{
    background:var(--paper); border-radius:4px; padding:26px; max-width:440px; width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,0.5); text-align:center; max-height:85vh; overflow-y:auto;
  }
  .modal-box h2{font-family:'Playfair Display',serif; font-size:26px; margin:6px 0;}
  .rank-list{text-align:left; margin-top:14px;}
  .rank-list .rl-row{display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed rgba(29,43,53,0.2); font-family:'JetBrains Mono',monospace; font-size:13px;}

  .log-entry{
    display:flex;gap:10px;
    padding:9px 0;
    border-bottom:1px dashed rgba(255,255,255,0.12);
  }
  .log-time{
    font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(244,239,221,0.4);
    white-space:nowrap;padding-top:2px;
  }
  .log-text{font-size:12.5px;color:rgba(244,239,221,0.85);line-height:1.45;}
  .log-text b{color:var(--brass-light);}
  .log-text .log-meta{display:block; font-size:10px; color:rgba(244,239,221,0.35); margin-top:2px;}
  .empty-log{color:rgba(244,239,221,0.4);font-size:12px;text-align:center;padding:20px 0;font-style:italic;}
  .log-toolbar{display:flex; gap:8px; margin-bottom:10px;}
  .log-toolbar input{flex:1; font-family:'Inter',sans-serif; font-size:13px; padding:9px 10px; border-radius:2px; border:1px solid rgba(244,239,221,0.25); background:rgba(244,239,221,0.08); color:var(--paper); min-height:38px;}
  .log-toolbar input::placeholder{color:rgba(244,239,221,0.4);}

  .skeleton{
    background:linear-gradient(90deg, rgba(255,255,255,0.15) 25%, rgba(255,255,255,0.3) 37%, rgba(255,255,255,0.15) 63%);
    background-size:400% 100%; animation:skeletonPulse 1.4s ease infinite; border-radius:3px; height:60px; margin-bottom:10px;
  }
  @keyframes skeletonPulse{0%{background-position:100% 50%;}100%{background-position:0 50%;}}

  select, input{outline:none;}
  select:focus, input:focus{border-color:var(--brass);}
  
  .chart-container {
    position: relative; height: 220px; width: 100%; margin-bottom: 20px; margin-left: 10px;
  }
  @media (max-width:380px){
    .masthead h1{font-size:28px;}
    .liquid-cash{font-size:19px;}
  }
</style>
</head>
<body>
<div id="toast-container"></div>
<div id="app"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, update, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAmmXAvo6-q1iz36LuvLl7W95f17Q0_pTY",
    authDomain: "business-da37a.firebaseapp.com",
    projectId: "business-da37a",
    storageBucket: "business-da37a.firebasestorage.app",
    messagingSenderId: "452662224355",
    appId: "1:452662224355:web:ab9af70d8d8f3121002cd6",
    databaseURL: "https://business-da37a-default-rtdb.firebaseio.com"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const getRoomId = () => window.location.hash.replace('#', '').trim();

  window.addEventListener('hashchange', () => {
    window.location.reload();
  });

  // ============================================================
  // MODULE: Client Runtime State
  // ============================================================
  let state = null;
  let lobbyState = null;
  let isOnline = navigator.onLine;
  let isProcessing = false; // simple lock to prevent duplicate submissions

  // Local Session Management (Fixed strict checking)
  const identityKey = 'ledger_identity_' + getRoomId();
  let localPlayerId = getRoomId() ? localStorage.getItem(identityKey) : null;
  if(localPlayerId === 'null') localPlayerId = null; // Clean ghost sessions
  
  let currentView = 'dashboard'; 
  
  // Chart Instances
  let barChart = null;
  let pieChart = null;
  let flowChart = null;

  window.addEventListener('online', ()=>{ isOnline = true; render(); });
  window.addEventListener('offline', ()=>{ isOnline = false; render(); });

  // ============================================================
  // MODULE: Utilities
  // ============================================================
  function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function escapeAttr(s){ return escapeHtml(s); }
  function uid(){ return Math.random().toString(36).slice(2,9); }
  function fmt(n){ const neg = n < 0; const v = Math.abs(Math.round(n)); return (neg?'-':'') + '$' + v.toLocaleString('en-US'); }
  function nowIso(){ return new Date().toISOString(); }
  function timeShort(iso){ try{ const d = new Date(iso); return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}); }catch(e){ return ''; } }

  // -------------------------------------------------------------
  // TOAST NOTIFICATIONS (RULES SYSTEM)
  // -------------------------------------------------------------
  function showToast(title, message) {
    const container = document.getElementById('toast-container');
    if(!container) return;
    const t = document.createElement('div');
    t.className = 'toast';
    t.innerHTML = `<b>${title}</b>${message}`;
    container.appendChild(t);
    setTimeout(() => t.remove(), 6000);
  }

  function triggerRuleReminder(txType) {
    const rules = {
      'buyProperty': { t: 'Rule: Buying Property', m: 'Unowned properties you land on can be bought. If you decline, the Bank keeps it unowned.' },
      'mortgage': { t: 'Rule: Mortgages', m: 'Mortgaged properties collect NO rent and cannot be built on. To unmortgage, pay the Bank the exact mortgage value.' },
      'duty': { t: 'Rule: Duty / Taxes', m: 'Custom Duty = $100 per unmortgaged property (Max $1000). Travelling Duty = $50 per property (Max $500).' },

  // MODULE: State Model & Migration

  function defaultState(){
    return {
      started:false, ended:false, round:1, players:[], board:[], log:[],
      currentTurnIdx:0, gameMode:'classic', winner:null, finalRanking:null,
      _draftShortGame:false

  // Ensures rooms created before this upgrade still load correctly (backward compatibility)
  function migrateState(data){
    const s = Object.assign(defaultState(), data);
    s.players = (s.players || []).map(p=>Object.assign({
      creditCard:{ used:false, remainingInstallments:0, paidInstallments:0, missedInstallments:0 },
      jailed:false, jailTurns:0, jailReason:'', jailEntryRound:0,
      passport:true, passportLostRound:0, bankrupt:false,
      stats:{ incomeEarned:0, moneyPaid:0, rentCollected:0, rentPaid:0, taxesPaid:0 }
    }, p, {
      creditCard: Object.assign({ used:false, remainingInstallments:0, paidInstallments:0, missedInstallments:0 }, p.creditCard||{}),
      stats: Object.assign({ incomeEarned:0, moneyPaid:0, rentCollected:0, rentPaid:0, taxesPaid:0 }, p.stats||{})
    }));
    s.board = (s.board || []).map(pr=>Object.assign({ houses:0, hotel:false }, pr));
    if(typeof s.currentTurnIdx !== 'number') s.currentTurnIdx = 0;
    if(!s.gameMode) s.gameMode = 'classic';
    return s;
  }

  async function saveState(){
    try{ 
      let gameRef = ref(db, 'ledger_rooms/' + getRoomId());
      await set(gameRef, state); 
    } catch(e){ 
      console.error('Firebase state persistence push failed', e); 
      showToast('Sync Error', 'Could not save to the server. Check your connection and try again.');
    }
  }

  function activePlayers(){ return (state.players || []).filter(p=>!p.bankrupt); }
  function playerById(id){ return (state.players || []).find(p=>p.id===id); }
  function ownedBy(playerId){ return (state.board || []).filter(pr=>pr.ownerId===playerId); }
  function getHouseCost(prop){ return Math.max(100, Math.round((prop.price*0.25)/100)*100); }
  function isBankerRole(){ return localPlayerId === 'banker'; }
  function currentTurnPlayer(){ return (state.players||[])[state.currentTurnIdx] || null; }
  function isMyTurn(){
    const cp = currentTurnPlayer();
    return !!cp && cp.id === localPlayerId;
  }
  function colorGroup(prop){
    const master = MASTER_PROPERTIES.find(m=>m.name===prop.name);
    return master ? master.color : prop.color;
  }
  function isMonopoly(prop){
    if(!prop.ownerId) return false;
    const color = colorGroup(prop);
    if(!color) return false;
    const group = (state.board||[]).filter(b=>colorGroup(b)===color);
    return group.length>0 && group.every(g=>g.ownerId===prop.ownerId);
  }

  // ============================================================
  // MODULE: Rules Engine — Rent
  // ============================================================
  function calcRent(prop){
    if(!prop) return {final:0, breakdown:['No property selected.']};
    if(!prop.ownerId) return {final:0, breakdown:['Unowned — no rent due.']};
    if(prop.mortgaged) return {final:0, breakdown:['Property is MORTGAGED — no rent collected.']};
    let base = prop.rent;
    let breakdown = [`Base rent: ${fmt(base)}`];
    let rent = base;
    if(prop.category==='Transport'){
      const ownedTransport = (state.board||[]).filter(b=>b.category==='Transport' && b.ownerId===prop.ownerId && !b.mortgaged).length;
      rent = base*Math.max(1,ownedTransport);
      breakdown.push(`${ownedTransport} transport propert${ownedTransport===1?'y':'ies'} owned → ×${Math.max(1,ownedTransport)} = ${fmt(rent)}`);
    } else {
      if(prop.hotel){
        rent = base*5;
        breakdown.push(`Hotel built → ×5 = ${fmt(rent)}`);
      } else if(prop.houses>0){
        rent = base*(1+prop.houses);
        breakdown.push(`${prop.houses} house(s) built → ×${1+prop.houses} = ${fmt(rent)}`);
      } else if(isMonopoly(prop)){
        rent = base*2;
        breakdown.push(`MONOPOLY on ${colorGroup(prop)} group → ×2 = ${fmt(rent)}`);
      } else {
        breakdown.push('No monopoly, no buildings — base rent applies.');
      }
    }
    return {final:Math.round(rent), breakdown};
  }

  function rentBlockReason(owner, prop){
    if(!owner) return 'No owner on record.';
    if(owner.bankrupt) return `${owner.name} is bankrupt — rent cannot be collected.`;
    if(!owner.passport) return `${owner.name} has no Passport — rent collection is blocked.`;
    if(prop.mortgaged) return 'Property is mortgaged — no rent due.';
    if(owner.jailed) return `${owner.name} is in Jail — rent cannot be collected while jailed.`;
    return null;
  }

  // ============================================================
  // MODULE: Rules Engine — Turns, Jail, Passport, Bankruptcy, Winner
  // ============================================================
  function nextTurn(manual){
    const n = (state.players||[]).length;
    if(n===0) return;
    let idx = state.currentTurnIdx ?? 0;
    let loop = 0;
    do{
      idx = (idx+1) % n;
      loop++;
    } while(state.players[idx] && state.players[idx].bankrupt && loop <= n);
    const wrapped = idx <= state.currentTurnIdx;
    state.currentTurnIdx = idx;
    if(wrapped){
      state.round += 1;
      applyPassportAutoRestore();
    }
    addLog(`Turn passes to <b>${escapeHtml(state.players[idx].name)}</b>.`, 'turn');
    saveState();
    checkForWinner();
  }
  function prevTurn(){
    const n = (state.players||[]).length;
    if(n===0) return;
    let idx = state.currentTurnIdx ?? 0;
    let loop = 0;
    do{
      idx = (idx-1+n) % n;
      loop++;
    } while(state.players[idx] && state.players[idx].bankrupt && loop <= n);
    state.currentTurnIdx = idx;
    addLog(`<b>Banker override:</b> turn moved back to <b>${escapeHtml(state.players[idx].name)}</b>.`, 'turn');
    saveState();
  }
  function applyPassportAutoRestore(){
    (state.players||[]).forEach(p=>{
      if(!p.bankrupt && !p.passport && p.passportLostRound && (state.round - p.passportLostRound) >= PASSPORT_ROUNDS_TO_RESTORE){
        p.passport = true;
        p.passportLostRound = 0;
        addLog(`<b>${escapeHtml(p.name)}</b>'s Passport was automatically restored after ${PASSPORT_ROUNDS_TO_RESTORE} rounds.`, 'passport');
      }
    });
  }
  function autoRuleSweep(){
    // Non-destructive UI-only sweep (does not save state) — used to refresh derived badges each snapshot.
    // Actual mutation of passport/jail state happens on turn transitions to keep single source of truth.
  }
  function checkForWinner(){
    if(!state.started || state.ended) return;
    const actives = activePlayers();
    if(actives.length===1 && (state.players||[]).length>1){
      endGame('classic');
    }
  }
  function computeFinalNetWorth(p){
    const owned = ownedBy(p.id);
    const propVal = owned.reduce((s,pr)=>{
      if(pr.mortgaged) return s;
      const bldg = pr.hotel ? getHouseCost(pr)*5 : (pr.houses||0)*getHouseCost(pr);
      return s + pr.price + bldg;
    },0);
    const ccDebt = (p.creditCard && p.creditCard.used) ? p.creditCard.remainingInstallments*2000 : 0;
    return p.cash + propVal - ccDebt;
  }
  function endGame(mode){
    const ranked = [...(state.players||[])].map(p=>({
      id:p.id, name:p.name, netWorth:computeFinalNetWorth(p), bankrupt:p.bankrupt
    })).sort((a,b)=>b.netWorth-a.netWorth);
    state.ended = true;
    state.winner = ranked[0] || null;
    state.finalRanking = ranked;
    addLog(`<b>GAME OVER</b> (${mode==='classic'?'last player standing':'ended by Banker'}). Winner: <b>${ranked[0]?escapeHtml(ranked[0].name):'—'}</b> with net worth ${ranked[0]?fmt(ranked[0].netWorth):'$0'}.`, 'game');
    saveState();
  }

  // ============================================================
  // MODULE: Transaction Log
  // ============================================================
  function addLog(text, kind){
    if(!state.log) state.log = [];
    state.log.unshift({ id:uid(), round:state.round, ts:nowIso(), text, kind: kind||'general' });
    if(state.log.length>400) state.log = state.log.slice(0,400);
  }
  function stashUndoSnapshot(){
    state._undo = JSON.stringify({
      players: state.players, board: state.board, log: state.log,
      currentTurnIdx: state.currentTurnIdx, round: state.round, ended: state.ended, winner: state.winner, finalRanking: state.finalRanking
    });
  }
  function undoLast(){
    if(!state._undo){ showToast('Nothing to Undo', 'There is no recent transaction to reverse.'); return; }
    try{
      const snap = JSON.parse(state._undo);
      state.players = snap.players; state.board = snap.board; state.log = snap.log;
      state.currentTurnIdx = snap.currentTurnIdx; state.round = snap.round;
      state.ended = snap.ended; state.winner = snap.winner; state.finalRanking = snap.finalRanking;
      state._undo = null;
      showToast('Undo Complete', 'The last transaction was reversed.');
      saveState();
    }catch(e){
      showToast('Undo Failed', 'Could not parse the previous snapshot.');
    }
  }
  function exportLogCSV(){
    const rows = [['Round','Time','Entry']];
    (state.log||[]).forEach(l=>{
      const plain = l.text.replace(/<[^>]+>/g,'');
      rows.push([l.round, l.ts, plain.replace(/"/g,'""')]);
    });
    const csv = rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `ledger-${getRoomId()}-log.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function render(){
    const app = document.getElementById('app');
    const offlineHtml = !isOnline ? `<div class="offline-banner">⚠ You are offline — changes will not sync until reconnected.</div>` : '';

    // Phase 1: Setup
    if(!state.started){
      app.innerHTML = offlineHtml + renderSetup();
      bindSetup();
      return;
    }
    
    // Phase 2: Identity Gate (Strict Check)
    if(!localPlayerId){
      app.innerHTML = offlineHtml + renderIdentityGate();
      bindIdentityGate();
      return;
    }

    // Winner modal (classic or manual end)
    if(state.ended){
      app.innerHTML = offlineHtml + renderHeader() + renderWinnerModal();
      bindWinnerModal();
      return;
    }

    // Phase 3: Main Application Routing
    let content = offlineHtml + renderHeader() + renderTurnBanner() + renderNavTabs();
    
    if (currentView === 'dashboard') {
      content += renderDashboard();
    } else if (currentView === 'overview') {
      content += renderOverview();
    } else {
      content += renderLogView();
    }
    
    content += renderBottomNav();
    app.innerHTML = content;
    bindDashboard();
    bindBottomNav();
    
    if(currentView === 'overview') {
      setTimeout(updateCharts, 50);
    }
  }

  function bindIdentityGate() {
    document.querySelectorAll('[data-identity]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        localPlayerId = e.target.dataset.identity;
        localStorage.setItem(identityKey, localPlayerId);
        showToast("Identity Verified", "You are now connected to the live session.");
        render();
      });
    });
  }

  function renderHeader(){
    const myPlayer = playerById(localPlayerId);
    const greeting = myPlayer ? `Hey, ${escapeHtml(myPlayer.name)}` : (isBankerRole() ? 'Banker View' : 'Spectator');
    return `
      <div class="masthead">
        <div class="eyebrow">ROOM: ${escapeHtml(getRoomId().toUpperCase())} &middot; ${greeting}${state.gameMode==='short'?' &middot; SHORT GAME':''}</div>
        <h1>THE LEDGER</h1>
        <div class="sub">a live account of fortunes won & lost</div>
        <div class="round-strip">
          <span class="round-pill">ROUND ${state.round}</span>
          <button class="btn-ghost" data-action="switch-user">switch player</button>
          <button class="btn-ghost" data-action="leave-room">&larr; lobby</button>
          ${isBankerRole()?`<button class="btn-ghost" data-action="reset-game">reset</button>`:''}
        </div>
      </div>
    `;
  }

  function renderTurnBanner(){
    if(state.ended) return '';
    const cp = currentTurnPlayer();
    if(!cp) return '';
    const mine = isMyTurn();
    return `
      <div class="turn-banner">
        <span>${mine?'🟢 It is <b>your</b> turn':`Current turn: <b>${escapeHtml(cp.name)}</b>`}${cp.jailed?' (in Jail)':''}</span>
        <span style="display:flex; gap:6px;">
          ${isBankerRole()?`<button class="btn-small" data-action="prev-turn">◀ Prev</button>`:''}
          <button class="btn-small good" data-action="next-turn">${mine||isBankerRole()?'End Turn ▶':'▶'}</button>
          ${isBankerRole()?`<button class="btn-small danger" data-action="end-game-manual">End Game</button>`:''}
        </span>
      </div>
    `;
  }

  function renderSetup(){
    if(!state._draftPlayers || state._draftPlayers.length===0) state._draftPlayers = ['',''];
    const rows = state._draftPlayers.map((name,i)=>`
      <div class="player-input-row">
        <input type="text" data-draft-idx="${i}" value="${escapeAttr(name)}" placeholder="Player ${i+1} name" maxlength="18">
        ${state._draftPlayers.length>2?`<button class="icon-btn" data-remove-draft="${i}">&times;</button>`:''}
      </div>
    `).join('');
    return `
      <div class="masthead">
        <div class="eyebrow">ROOM: ${escapeHtml(getRoomId().toUpperCase())} &middot; Live Sync</div>
        <h1>THE LEDGER</h1>
        <div class="sub">a live account of fortunes won & lost</div>
        <div class="round-strip" style="margin-top:16px;">
          <button class="btn-ghost" data-action="leave-room" style="padding:6px 14px;">&larr; Back to Lobby</button>
        </div>
      </div>
      <div class="paper-card">
        <div class="card-title">Open new accounts</div>
        <div class="card-hint">Every player starts with $25,000 cash, a $10,000 credit line, and a valid passport.</div>
        ${rows}
        <button class="btn-secondary" data-action="add-draft" style="margin-bottom:14px;">+ add player</button>
        <div class="field-label">Game mode</div>
        <div class="field-row" style="margin-bottom:10px;">
          <button class="btn-small ${!state._draftShortGame?'good':''}" data-action="mode-classic" style="flex:1;">Classic</button>
          <button class="btn-small ${state._draftShortGame?'good':''}" data-action="mode-short" style="flex:1;">Short Game</button>
        </div>
        <div class="hint-box">${state._draftShortGame? 'Short Game: each player is instantly dealt 2 random properties, paid for automatically from their starting cash.' : 'Classic: standard full-length game, properties bought as players land on them.'}</div>
        <button class="btn-primary" data-action="start-game">Start the game</button>
      </div>
    `;
  }

  // --- DASHBOARD VIEW (Specific to User) ---
  function renderDashboard() {
    let html = '';
    const p = playerById(localPlayerId);
    
    if (p) {
      const owned = ownedBy(p.id);
      const nw = computeFinalNetWorth(p);
      html += `
        <div class="section-label">Your Accounts</div>
        <div class="paper-card ${p.bankrupt?'bankrupt':''}" style="text-align:center;">
          <div class="sub-figures" style="justify-content:center; margin-bottom:4px;">Liquid Cash Available</div>
          <div class="liquid-cash" style="font-size:36px; margin-bottom:12px;">${fmt(p.cash)}</div>
          <div class="sub-figures" style="justify-content:center;">
            <span>net worth: ${fmt(nw)}</span>
            <span>props: ${owned.filter(pr=>!pr.mortgaged).length}</span>
          </div>
          ${stampRow(p)}
          <div class="stat-grid">
            <div class="stat-box"><div class="lbl">Income Earned</div><div class="val">${fmt(p.stats.incomeEarned)}</div></div>
            <div class="stat-box"><div class="lbl">Money Paid</div><div class="val">${fmt(p.stats.moneyPaid)}</div></div>
            <div class="stat-box"><div class="lbl">Rent Collected</div><div class="val">${fmt(p.stats.rentCollected)}</div></div>
            <div class="stat-box"><div class="lbl">Rent Paid</div><div class="val">${fmt(p.stats.rentPaid)}</div></div>
            <div class="stat-box"><div class="lbl">Taxes Paid</div><div class="val">${fmt(p.stats.taxesPaid)}</div></div>
            <div class="stat-box"><div class="lbl">Total Assets</div><div class="val">${fmt(nw - p.cash)}</div></div>
          </div>
          ${p.creditCard.used ? `
            <div class="hint-box" style="text-align:left; margin-top:14px;">
              <b>Credit Card:</b> ${p.creditCard.remainingInstallments} of 6 installments remaining ·
              paid ${p.creditCard.paidInstallments} · balance owed ${fmt(p.creditCard.remainingInstallments*2000)}
              ${p.creditCard.missedInstallments>0?` · <span style="color:var(--stamp-red);">${p.creditCard.missedInstallments} missed</span>`:''}
            </div>
          ` : ''}
          <hr style="border:none; border-top:1px dashed rgba(29,43,53,0.2); margin:16px 0;">
          <div class="card-title" style="font-size:15px; margin:0 0 10px 0; text-align:left;">Your Portfolio</div>
          <div class="props-list" style="border:none; padding:0; text-align:left;">
            ${owned.length===0?'<div style="font-size:12px;color:rgba(29,43,53,0.5);">No properties owned yet.</div>':''}
            ${owned.map(pr=>propertyDetailRow(pr)).join('')}
          </div>
        </div>
      `;
    } else {
      html += `<div class="hint-box" style="margin-bottom:16px;">You are observing as the Banker/Spectator. Use the action panel below to orchestrate the game.</div>`;
    }
    
    html += renderActionPanel();
    return html;
  }

  function propertyDetailRow(pr){
    const mono = isMonopoly(pr);
    return `
      <div class="prop-row" style="flex-direction:column; align-items:stretch;">
        <div style="display:flex; justify-content:space-between; width:100%;">
          <span><span class="cat">${pr.category}</span>${escapeHtml(pr.name)}
            ${pr.mortgaged?'<span class="mort">MORTGAGED</span>':''}
            ${mono?'<span class="badge-monopoly">MONOPOLY COMPLETE</span>':''}
            ${pr.hotel?'<span class="bldg">🏨 HOTEL</span>':(pr.houses>0?`<span class="bldg">🏠×${pr.houses}</span>`:'')}
          </span>
          <span>${fmt(pr.price)}</span>
        </div>
        <div style="font-size:10.5px; color:rgba(29,43,53,0.55); font-family:'JetBrains Mono',monospace; margin-top:2px;">
          rent now: ${fmt(calcRent(pr).final)} · mortgage value: ${fmt(pr.mortgage)}
        </div>
      </div>
    `;
  }

  function stampRow(p){
    let stamps = '';
    if(p.jailed) stamps += `<span class="stamp">IN JAIL</span>`;
    if(!p.passport) stamps += `<span class="stamp blue">NO PASSPORT</span>`;
    if(p.creditCard && p.creditCard.used) stamps += `<span class="stamp gold">CREDIT: ${p.creditCard.remainingInstallments} LEFT</span>`;
    if(p.bankrupt) stamps += `<span class="stamp">BANKRUPT</span>`;
    return stamps ? `<div class="stamps" style="justify-content:center;">${stamps}</div>` : '';
  }

  // --- OVERVIEW VIEW (Global Stats) ---
  function renderOverview() {
    let html = `
      <div class="section-label">Live Analytics</div>
      <div class="paper-card">
        <div class="card-title" style="font-size:14px; text-align:center; margin:0 0 10px 0;">Capital & Equity</div>
        <div class="chart-container">
          <canvas id="netWorthChart"></canvas>
        </div>
        <hr style="border:none; border-top:1px dashed rgba(29,43,53,0.2); margin:20px 0;">
        <div class="card-title" style="font-size:14px; text-align:center; margin:0 0 10px 0;">Global Real Estate Control</div>
        <div class="chart-container" style="height: 180px;">
          <canvas id="assetChart"></canvas>
        </div>
        <hr style="border:none; border-top:1px dashed rgba(29,43,53,0.2); margin:20px 0;">
        <div class="card-title" style="font-size:14px; text-align:center; margin:0 0 10px 0;">Income vs. Expenses</div>
        <div class="chart-container" style="height: 200px;">
          <canvas id="flowChart"></canvas>
        </div>
      </div>
    `;
    const totalMoney = (state.players||[]).reduce((s,p)=>s+p.cash,0) + (state.board||[]).reduce((s,pr)=>s+(pr.mortgaged?pr.mortgage:0),0);
    const richest = [...(state.players||[])].sort((a,b)=>computeFinalNetWorth(b)-computeFinalNetWorth(a))[0];
    html += `
      <div class="section-label">At a Glance</div>
      <div class="stat-grid" style="margin-bottom:16px;">
        <div class="stat-box" style="background:var(--paper);"><div class="lbl">Total Money in Circulation</div><div class="val">${fmt(totalMoney)}</div></div>
        <div class="stat-box" style="background:var(--paper);"><div class="lbl">Most Valuable Player</div><div class="val">${richest?escapeHtml(richest.name):'—'}</div></div>
      </div>
    `;
    
    html += renderLeaderboard();
    return html;
  }

  function renderLeaderboard(){
    const sorted = [...(state.players || [])].sort((a,b)=>a.cash - b.cash).reverse();
    const cards = sorted.map((p,i)=>{
      const propsOpen = state._openProps === p.id;
      const owned = ownedBy(p.id);
      const isTurn = currentTurnPlayer() && currentTurnPlayer().id===p.id && !state.ended;
      const propsHtml = propsOpen ? `
        <div class="props-list">
          ${owned.length===0?'<div style="font-size:12px;color:rgba(29,43,53,0.5);">No properties owned yet.</div>':''}
          ${owned.map(pr=>propertyDetailRow(pr)).join('')}
        </div>` : '';
      return `
        <div class="player-card ${p.bankrupt?'bankrupt':''} ${isTurn?'your-turn':''}">
          <div class="rank-row">
            <div class="rank-name">
              <span class="rank-num">#${i+1}</span>
              <span class="p-name">${escapeHtml(p.name)}</span>
              ${isTurn?'<span class="badge-monopoly">ON TURN</span>':''}
              ${p.jailed?'<span class="badge-monopoly badge-jail">JAIL</span>':''}
              ${!p.passport?'<span class="badge-monopoly badge-nopass">NO PASSPORT</span>':''}
            </div>
            <div class="liquid-cash">${fmt(p.cash)}</div>
          </div>
          <div class="sub-figures">
            <span>net worth ${fmt(computeFinalNetWorth(p))}</span>
            <span>props ${owned.filter(pr=>!pr.mortgaged).length}</span>
            <span>houses ${owned.reduce((s,pr)=>s+(pr.houses||0),0)}</span>
            <span>hotels ${owned.filter(pr=>pr.hotel).length}</span>
          </div>
          ${stampRow(p)}
          <div class="props-toggle" data-toggle-props="${p.id}">${propsOpen?'hide portfolio ▲':'view portfolio ▾'}</div>
          ${propsHtml}
        </div>
      `;
    }).join('');
    return `<div class="section-label">Live Standings</div>${cards}`;
  }

  function renderLogView(){
    const q = (state._logSearch || '').toLowerCase();
    const logs = (state.log||[]).filter(l=> !q || l.text.toLowerCase().includes(q));
    const rows = logs.length===0
      ? `<div class="empty-log">No matching transactions.</div>`
      : logs.slice(0,150).map(l=>`
        <div class="log-entry">
          <div class="log-time">R${l.round}</div>
          <div class="log-text">${l.text}<span class="log-meta">${timeShort(l.ts)}</span></div>
        </div>
      `).join('');
    return `
      <div class="section-label">
        <span>Transaction History</span>
        <span style="display:flex; gap:6px;">
          ${isBankerRole()?`<button class="btn-small" data-action="undo-last">Undo Last</button>`:''}
          <button class="btn-small" data-action="export-log">Export CSV</button>
        </span>
      </div>
      <div class="log-toolbar">
        <input type="text" id="logSearch" placeholder="Search the ledger…" value="${escapeAttr(state._logSearch||'')}">
      </div>
      ${rows}
    `;
  }

  function playerOptions(filterFn){
    let list = state.players || [];
    if(filterFn) list = list.filter(filterFn);
    return list.map(p=>`<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('');
  }

  function propertyOptions(list){
    if(!list || list.length===0) return `<option value="">— none available —</option>`;
    const groups = {};
    list.forEach(pr=>{ (groups[pr.category] = groups[pr.category]||[]).push(pr); });
    return Object.keys(groups).map(cat=>`
      <optgroup label="${cat}">
        ${groups[cat].map(pr=>`<option value="${pr.id}">${escapeHtml(pr.name)} — Buy: ${fmt(pr.price)} | Rent: ${fmt(calcRent(pr).final)} | Mort: ${fmt(pr.mortgage)}</option>`).join('')}
      </optgroup>
    `).join('');
  }

  function renderActionPanel(){
    const t = state._txType || 'buyProperty';
    const p = playerById(localPlayerId);
    const locked = !isBankerRole() && p && !p.bankrupt && !isMyTurn() && !state.ended;
    const disabledPlayer = p && p.bankrupt;
    return `
      <div class="section-label">Record a transaction</div>
      ${locked ? `<div class="locked-note">🔒 It isn't your turn yet — only the active player or the Banker can record actions. You can still view everything live.</div>` : ''}
      ${disabledPlayer ? `<div class="locked-note">You are bankrupt and can no longer perform transactions.</div>` : ''}
      <div class="paper-card" style="${(locked||disabledPlayer)?'opacity:0.5; pointer-events:none;':''}">
        <select class="action-select" id="txType">
          <optgroup label="Property">
            <option value="buyProperty" ${t==='buyProperty'?'selected':''}>Buy property from Bank</option>
            <option value="sellProperty" ${t==='sellProperty'?'selected':''}>Sell property to Bank</option>
            <option value="mortgage" ${t==='mortgage'?'selected':''}>Mortgage property</option>
            <option value="unmortgage" ${t==='unmortgage'?'selected':''}>Lift mortgage</option>
            <option value="payRent" ${t==='payRent'?'selected':''}>Pay rent to another player</option>
          </optgroup>
          <optgroup label="Buildings">
            <option value="buildHouse" ${t==='buildHouse'?'selected':''}>Build a house</option>
            <option value="sellHouse" ${t==='sellHouse'?'selected':''}>Sell a house</option>
            <option value="buildHotel" ${t==='buildHotel'?'selected':''}>Build a hotel</option>
            <option value="sellHotel" ${t==='sellHotel'?'selected':''}>Sell a hotel</option>
          </optgroup>
          <optgroup label="Bank">
            <option value="passStart" ${t==='passStart'?'selected':''}>Pass / land on Start (collect $1,500)</option>
            <option value="bankPay" ${t==='bankPay'?'selected':''}>Pay the Bank (other)</option>
            <option value="bankReceive" ${t==='bankReceive'?'selected':''}>Receive from Bank (other)</option>
            <option value="duty" ${t==='duty'?'selected':''}>Custom / Travelling duty</option>
          </optgroup>
          <optgroup label="Credit Card">
            <option value="creditCardUse" ${t==='creditCardUse'?'selected':''}>Use credit card</option>
            <option value="creditCardInstallment" ${t==='creditCardInstallment'?'selected':''}>Pay credit card installment</option>
            <option value="creditCardMissed" ${t==='creditCardMissed'?'selected':''}>Record missed installment (→ Jail)</option>
          </optgroup>
          <optgroup label="Chance & UNO">
            <option value="cardDraw" ${t==='cardDraw'?'selected':''}>Draw a Chance / UNO card</option>
          </optgroup>
          <optgroup label="Board Events">
            <option value="partyHouse" ${t==='partyHouse'?'selected':''}>Party House (collect from all)</option>
            <option value="resort" ${t==='resort'?'selected':''}>Resort (pay to all)</option>
          </optgroup>
          <optgroup label="Status">
            <option value="jailEnter" ${t==='jailEnter'?'selected':''}>Go to Jail</option>
            <option value="jailExit" ${t==='jailExit'?'selected':''}>Get out of Jail</option>
            <option value="passportRegain" ${t==='passportRegain'?'selected':''}>Regain passport</option>
            <option value="bankrupt" ${t==='bankrupt'?'selected':''}>Declare bankruptcy</option>
          </optgroup>
        </select>
        ${renderFieldsFor(t)}
        <div class="bottom-actions">
          <button class="btn-primary" id="btnSubmitTx">Record it</button>
        </div>
      </div>
    `;
  }

  function renderFieldsFor(t){
    const active = (p)=>!p.bankrupt;
    switch(t){
      case 'buyProperty': {
        const available = (state.board || []).filter(pr=>!pr.ownerId);
        return `
        <div class="field-label">Player</div>
        <select class="action-select" id="f_player">${playerOptions(active)}</select>
        <div class="field-label">Property</div>
        <select class="action-select" id="f_property" data-autofill="price">${propertyOptions(available)}</select>
        <div class="field-label">Amount paid (edit for deals)</div>
        <input class="action-select" id="f_amount" type="number" placeholder="0">
      `; }
      case 'sellProperty': return `
        <div class="field-label">Player</div>
        <select class="action-select" id="f_player" data-props-source="1" data-only="unmortgaged">${playerOptions(active)}</select>
        <div class="field-label">Property</div>
        <select class="action-select" id="f_property" data-autofill="price"></select>
        <div class="field-label">Sale value received</div>
        <input class="action-select" id="f_amount" type="number" placeholder="0">
      `;
      case 'mortgage': return `
        <div class="field-label">Player</div>
        <select class="action-select" id="f_player" data-props-source="1" data-only="unmortgaged">${playerOptions(active)}</select>
        <div class="field-label">Property to mortgage</div>
        <select class="action-select" id="f_property" data-autofill="mortgage"></select>
        <div class="field-label">Mortgage value received from Bank</div>
        <input class="action-select" id="f_amount" type="number" placeholder="0">

      case 'unmortgage': return `
        <div class="field-label">Player</div>
        <select class="action-select" id="f_player" data-props-source="1" data-only="mortgaged">${playerOptions(active)}</select>
        <div class="field-label">Mortgaged property</div>
        <select class="action-select" id="f_property" data-autofill="mortgage"></select>
        <div class="field-label">Amount paid to Bank to lift mortgage</div>
        <input class="action-select" id="f_amount" type="number" placeholder="0">
      `;
      case 'payRent': return `
        <div class="field-label">Paid by</div>
        <select class="action-select" id="f_player">${playerOptions(active)}</select>
        <div class="field-label">Paid to</div>

          <div>
            <div class="field-label">Property</div>

              <option value="">— select property —</option>
            </select>
          </div>
          <div><div class="field-label">Rent amount</div><input class="action-select" id="f_amount" type="number" placeholder="0"></div>
        </div>
        <div id="rentBreakdown"></div>
        <div id="rentWarning"></div>
      `;
      case 'buildHouse': return `
        <div class="field-label">Player</div>
        <select class="action-select" id="f_player" data-props-source="1" data-only="canBuildHouse">${playerOptions(active)}</select>
        <div class="field-label">Property (must be a completed colour group)</div>
        <select class="action-select" id="f_property"></select>
        <div id="houseHint" class="hint-box"></div>
      `;
      case 'sellHouse': return `
        <div class="field-label">Player</div>
        <select class="action-select" id="f_player" data-props-source="1" data-only="hasHouse">${playerOptions(active)}</select>
        <div class="field-label">Property</div>
        <select class="action-select" id="f_property"></select>
        <div id="houseHint" class="hint-box"></div>

      case 'buildHotel': return `
        <div class="field-label">Player</div>

        <div class="field-label">Property (needs 4 houses)</div>
        <select class="action-select" id="f_property"></select>
        <div id="houseHint" class="hint-box"></div>

      case 'sellHotel': return `
        <div class="field-label">Player</div>
        <select class="action-select" id="f_player" data-props-source="1" data-only="hasHotel">${playerOptions(active)}</select>
        <div class="field-label">Property</div>
        <select class="action-select" id="f_property"></select>
        <div id="houseHint" class="hint-box"></div>

      case 'passStart': return `
        <div class="field-label">Player</div>
        <select class="action-select" id="f_player">${playerOptions(active)}</select>
        <div class="hint-box">Collects ${fmt(PASS_START_BONUS)} from the Bank for passing or landing on Start.</div>
      `;
      case 'bankPay': return `
        <div class="field-label">Player</div>
        <select class="action-select" id="f_player">${playerOptions(active)}</select>
        <div class="field-row">
          <div><div class="field-label">Reason</div><input class="action-select" id="f_reason" placeholder="e.g. Jail fine"></div>
          <div><div class="field-label">Amount</div><input class="action-select" id="f_amount" type="number" placeholder="0"></div>
        </div>
      `;
      case 'bankReceive': return `
        <div class="field-label">Player</div>
        <select class="action-select" id="f_player">${playerOptions(active)}</select>
        <div class="field-row">
          <div><div class="field-label">Reason</div><input class="action-select" id="f_reason" placeholder="e.g. refund"></div>
          <div><div class="field-label">Amount</div><input class="action-select" id="f_amount" type="number" placeholder="0"></div>
        </div>
      `;
      case 'duty': return `
        <div class="field-label">Player</div>
        <select class="action-select" id="f_player">${playerOptions(active)}</select>
        <div class="field-label">Duty type</div>
        <select class="action-select" id="f_dutyType">
          <option value="custom">Custom Duty — $100 / property (max $1,000)</option>
          <option value="travel">Travelling Duty — $50 / property (max $500)</option>
        </select>
        <div class="hint-box" id="dutyHint">Select a player to see the calculated amount.</div>
      `;
      case 'creditCardUse': return `
        <div class="field-label">Player</div>
        <select class="action-select" id="f_player" data-only="noCC">${playerOptions(active)}</select>

  function updateCharts() {
    const players = activePlayers();
    
    const ctxNW = document.getElementById('netWorthChart');
    if(ctxNW) {
      if(barChart) barChart.destroy();
      
      const labels = players.map(p => p.name);
      const cashData = players.map(p => p.cash);
      const assetData = players.map(p => ownedBy(p.id).reduce((s,pr)=>{
        if(pr.mortgaged) return s;
        const bldg = pr.hotel ? getHouseCost(pr)*5 : (pr.houses||0)*getHouseCost(pr);
        return s + pr.price + bldg;
      },0));
      
      barChart = new Chart(ctxNW, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            { label: 'Liquid Cash', data: cashData, backgroundColor: '#3C6E47', borderRadius: 2 },
            { label: 'Property + Buildings', data: assetData, backgroundColor: '#B08D3E', borderRadius: 2 }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: {
            x: { stacked: true, grid: { display: false } },
            y: { stacked: true, grid: { color: 'rgba(29,43,53,0.1)' }, ticks: { font: {family: 'JetBrains Mono'} } }
          },
          plugins: { legend: { labels: { font: { family: 'Inter', size: 11 } } } }
        }
      });
    }

    const ctxAsset = document.getElementById('assetChart');
    if(ctxAsset) {
      if(pieChart) pieChart.destroy();
      
      const labels = players.map(p => p.name);
      const propCounts = players.map(p => ownedBy(p.id).filter(pr=>!pr.mortgaged).length);
      const bgColors = ['#1D2B35', '#B08D3E', '#9B3A34', '#2E4A6B', '#3C6E47', '#D8BB74'];
      
      pieChart = new Chart(ctxAsset, {
        type: 'doughnut',
        data: {
          labels: labels,
          datasets: [{ data: propCounts, backgroundColor: bgColors.slice(0, players.length), borderWidth: 2, borderColor: '#F4EFDD' }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'right', labels: { font: { family: 'Inter', size: 11 } } } },
          cutout: '60%'
        }
      });
    }

    const ctxFlow = document.getElementById('flowChart');
    if(ctxFlow){
      if(flowChart) flowChart.destroy();
      const labels = players.map(p=>p.name);
      const income = players.map(p=>p.stats.incomeEarned + p.stats.rentCollected);
      const expense = players.map(p=>p.stats.moneyPaid + p.stats.rentPaid + p.stats.taxesPaid);
      flowChart = new Chart(ctxFlow, {
        type:'bar',
        data:{ labels, datasets:[
          { label:'Income', data:income, backgroundColor:'#3C6E47', borderRadius:2 },
          { label:'Expenses', data:expense, backgroundColor:'#9B3A34', borderRadius:2 }
        ]},
        options:{
          responsive:true, maintainAspectRatio:false,
          scales:{ x:{ grid:{display:false} }, y:{ grid:{color:'rgba(29,43,53,0.1)'}, ticks:{font:{family:'JetBrains Mono'}} } },
          plugins:{ legend:{ labels:{ font:{family:'Inter', size:11} } } }
        }
      });
    }
  }

  // ============================================================
  // MODULE: Event Bindings — Setup
  // ============================================================
  function bindSetup(){
    document.querySelectorAll('[data-draft-idx]').forEach(inp=>{
      inp.addEventListener('input', e=>{
        state._draftPlayers[parseInt(e.target.dataset.draftIdx)] = e.target.value;
      });
    });
    document.querySelectorAll('[data-remove-draft]').forEach(btn=>{
      btn.addEventListener('click', e=>{
        state._draftPlayers.splice(parseInt(e.target.dataset.removeDraft),1);
        render();
      });
    });
    const addBtn = document.querySelector('[data-action="add-draft"]');
    if(addBtn) addBtn.addEventListener('click', ()=>{
      if(state._draftPlayers.length<6){ state._draftPlayers.push(''); render(); }
    });

    const modeClassic = document.querySelector('[data-action="mode-classic"]');
    if(modeClassic) modeClassic.addEventListener('click', ()=>{ state._draftShortGame = false; render(); });
    const modeShort = document.querySelector('[data-action="mode-short"]');
    if(modeShort) modeShort.addEventListener('click', ()=>{ state._draftShortGame = true; render(); });
    
    const leaveBtn = document.querySelector('[data-action="leave-room"]');
    if(leaveBtn) leaveBtn.addEventListener('click', () => {
      localStorage.removeItem(identityKey);
      window.location.hash = '';
    });

    const startBtn = document.querySelector('[data-action="start-game"]');
    if(startBtn) startBtn.addEventListener('click', ()=>{
      const names = state._draftPlayers.map(n=>n.trim()).filter(Boolean);
      if(names.length<2){ alert('Add at least two players.'); return; }
      const shortGame = !!state._draftShortGame;
      state.players = names.map(name=>({
        id: uid(), name, cash: 25000,
        creditCard: { used:false, remainingInstallments:0, paidInstallments:0, missedInstallments:0 },
        jailed:false, jailTurns:0, jailReason:'', jailEntryRound:0,
        passport:true, passportLostRound:0, bankrupt:false,
        stats:{ incomeEarned:0, moneyPaid:0, rentCollected:0, rentPaid:0, taxesPaid:0 }
      }));
      state.board = MASTER_PROPERTIES.map(pr=>({ 
        id: uid(), name: pr.name, price: pr.price, rent: pr.rent, mortgage: pr.mortgage, 
        category: pr.category, color: pr.color || "", ownerId: "", mortgaged:false,
        houses:0, hotel:false
      }));
      state.started = true;
      state.ended = false;
      state.winner = null;
      state.finalRanking = null;
      state.round = 1;
      state.currentTurnIdx = 0;
      state.gameMode = shortGame ? 'short' : 'classic';
      state.log = [];
      addLog(`<b>Game started.</b> ${names.length} accounts opened, each with $25,000 cash and a $10,000 credit line. Board loaded with 26 properties.${shortGame?' Short Game mode enabled.':''}`, 'game');

      if(shortGame){
        const shuffled = [...state.board].sort(()=>Math.random()-0.5);
        let ptr = 0;
        state.players.forEach(p=>{
          for(let i=0;i<2 && ptr<shuffled.length;i++,ptr++){
            const prop = shuffled[ptr];
            prop.ownerId = p.id;
            p.cash -= prop.price;
            addLog(`<b>${escapeHtml(p.name)}</b> was dealt <b>${escapeHtml(prop.name)}</b> for the Short Game (paid ${fmt(prop.price)}).`, 'property');
          }
        });
      }

      delete state._draftPlayers;
      delete state._draftShortGame;
      saveState();
    });
  }

      localStorage.removeItem(identityKey);

    });

    if(resetBtn) resetBtn.addEventListener('click', ()=>{

      }

      });
